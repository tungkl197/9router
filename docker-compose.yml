services:
  app:
    build: .
    ports:
      - "20128"
    environment:
      # Required
      - JWT_SECRET=${JWT_SECRET:-220d1c3d928d870ddfc5f744523d4ad6e24ec0290e1e8cac5bf55d91a9ed71b2}
      - INITIAL_PASSWORD=${INITIAL_PASSWORD:-123456}
      - DATA_DIR=${DATA_DIR:-/app/data} # Fixed to match Docker volume mount
      
      # Recommended runtime variables
      - PORT=${PORT:-20128}
      - NODE_ENV=${NODE_ENV:-production}
      
      # Recommended security and ops variables
      - API_KEY_SECRET=${API_KEY_SECRET:-endpoint-proxy-api-key-secret}
      - MACHINE_ID_SALT=${MACHINE_ID_SALT:-endpoint-proxy-salt}
      - ENABLE_REQUEST_LOGS=${ENABLE_REQUEST_LOGS:-false}
      - OBSERVABILITY_ENABLED=${OBSERVABILITY_ENABLED:-true}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - REQUIRE_API_KEY=${REQUIRE_API_KEY:-false}
      
      # Cloud sync variables
      - BASE_URL=${BASE_URL:-http://localhost:20128}
      - CLOUD_URL=${CLOUD_URL:-https://9router.com}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:20128}
      - NEXT_PUBLIC_CLOUD_URL=${NEXT_PUBLIC_CLOUD_URL:-https://9router.com}

      # Optional outbound proxy variables
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}

      # Misc
      - INSTANCE_NAME=${INSTANCE_NAME:-9router}
    volumes:
      - 9router-data:/app/data
    restart: unless-stopped

volumes:
  9router-data:
